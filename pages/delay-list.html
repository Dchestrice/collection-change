<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>延期审批</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div style="display:flex;align-items:center;gap:8px">
      <a href="dashboard.html" class="navbar-back">←</a>
      <div class="navbar-title">延期审批</div>
    </div>
  </nav>

  <!-- 状态Tab -->
  <div class="tabs" id="statusTabs">
    <div class="tab-item active" data-status="all" onclick="switchTab('all', this)">全部</div>
    <div class="tab-item" data-status="待审批" onclick="switchTab('待审批', this)">审批中<span class="tab-badge" id="pendingBadge">0</span></div>
    <div class="tab-item" data-status="已通过" onclick="switchTab('已通过', this)">已通过</div>
    <div class="tab-item" data-status="已拒绝" onclick="switchTab('已拒绝', this)">已拒绝</div>
  </div>

  <!-- 搜索 -->
  <div class="search-bar">
    <input class="search-input" id="searchInput" type="text" placeholder="搜索项目名称" oninput="renderList()">
  </div>

  <div class="main-content" id="approvalList" style="min-height:300px">
    <div class="loading"><div class="spinner"></div></div>
  </div>

  <script src="../js/mock.js"></script>
  <script src="../js/common.js"></script>
  <script>
    const user = JSON.parse(localStorage.getItem('currentUser') || 'null');
    if (!user) window.location.href = 'login.html';

    let currentTab = 'all';
    const urlParams = new URLSearchParams(window.location.search);
    const filterProjectId = urlParams.get('projectId');

    function updateBadge() {
      const pending = getFilteredApprovals().filter(a => a.status === '待审批').length;
      document.getElementById('pendingBadge').textContent = pending;
    }
    updateBadge();

    function switchTab(status, el) {
      currentTab = status;
      document.querySelectorAll('#statusTabs .tab-item').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      renderList();
    }

    function renderList() {
      const container = document.getElementById('approvalList');
      const keyword = (document.getElementById('searchInput').value || '').toLowerCase();
      let data = getFilteredApprovals();

      if (currentTab !== 'all') {
        data = data.filter(a => a.status === currentTab);
      }
      if (keyword) {
        data = data.filter(a => a.projectName.toLowerCase().includes(keyword));
      }
      if (filterProjectId) {
        data = data.filter(a => a.projectId === filterProjectId);
      }

      // 排序：待审批在前
      data.sort((a, b) => {
        const order = { '待审批': 0, '已通过': 1, '已拒绝': 2 };
        return (order[a.status] || 0) - (order[b.status] || 0);
      });

      if (data.length === 0) {
        container.innerHTML = renderEmpty('暂无审批记录');
        return;
      }

      const canApprove = user.role !== 'salesman';

      container.innerHTML = data.map(a => `
        <div class="card" onclick="viewDetail('${a.id}')">
          <div class="card-header">
            <div class="card-title" style="font-size:14px">${a.projectName}</div>
            ${getApprovalStatusTag(a.status)}
          </div>
          <div class="card-row"><span class="label">节点信息</span><span class="value">${a.nodeInfo || '-'}</span></div>
          <div class="card-row"><span class="label">申请人</span><span class="value">${a.applicantName}</span></div>
          <div class="card-row"><span class="label">原计划时间</span><span class="value">${formatDate(a.originalDate)}</span></div>
          <div class="card-row"><span class="label">申请延期至</span><span class="value" style="color:#fa8c16;font-weight:500">${formatDate(a.newDate)}</span></div>
          <div class="card-row"><span class="label">申请原因</span><span class="value" style="font-size:12px;color:#666">${a.reason}</span></div>
          ${a.opinion ? `<div class="card-row"><span class="label">审批意见</span><span class="value">${a.opinion}</span></div>` : ''}
          ${a.approverName ? `<div class="card-row"><span class="label">审批人</span><span class="value">${a.approverName} · ${a.approvalTime || ''}</span></div>` : ''}
          <div class="card-footer">
            ${a.status === '待审批' && canApprove ? `
              <span style="font-size:12px;color:#1677ff">点击进入审批 →</span>
            ` : ''}
            ${a.status === '待审批' && !canApprove ? `
              <span style="font-size:12px;color:#999">等待审批中…</span>
            ` : ''}
            ${a.status !== '待审批' ? `
              <span style="font-size:12px;color:#999">查看详情 →</span>
            ` : ''}
          </div>
        </div>
      `).join('');
    }

    function viewDetail(id) {
      window.location.href = 'delay-detail.html?id=' + id;
    }

    renderList();
  </script>
</body>
</html>
